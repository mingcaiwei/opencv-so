name: Build libsy.so (4 ABI)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        id: ndk
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          test -n "$ANDROID_NDK_HOME"
          test -f "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"
          echo "toolchain=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" >> $GITHUB_OUTPUT

      - name: Cache OpenCV Android SDK
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: OpenCV-android-sdk
          key: opencv-4.5.3-android-sdk-v1

      - name: Download OpenCV 4.5.3 Android SDK
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          curl -L -o opencv-sdk.zip \
            https://github.com/opencv/opencv/releases/download/4.5.3/opencv-4.5.3-android-sdk.zip
          unzip -q opencv-sdk.zip
          rm -f opencv-sdk.zip
          test -f OpenCV-android-sdk/sdk/native/jni/OpenCVConfig.cmake

      - name: Build all ABIs
        run: |
          set -e
          TOOLCHAIN="${{ steps.ndk.outputs.toolchain }}"
          OPENCV_SDK="$PWD/OpenCV-android-sdk"
          STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          test -x "$STRIP"
          ABIS="armeabi-v7a arm64-v8a x86 x86_64"
          for ABI in $ABIS; do
            echo "=== Building $ABI ==="
            cmake -B build-$ABI -S native \
              -DOPENCV_SDK="$OPENCV_SDK" \
              -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
              -DANDROID_ABI="$ABI" \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build build-$ABI -j$(nproc)
            # strip 符号表/调试信息（-Wl,-s 已在链接期 strip，此处兜底；幂等）
            # --strip-all 保留动态符号表 .dynsym，extern "C" 导出符号不受影响
            "$STRIP" --strip-all build-$ABI/libsy.so
            mkdir -p "界面/libs/$ABI"
            cp "build-$ABI/libsy.so" "界面/libs/$ABI/libsy.so"
            ls -lh "界面/libs/$ABI/libsy.so"
          done

      - name: Verify artifacts
        run: |
          READELF="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
            SO="界面/libs/$ABI/libsy.so"
            test -f "$SO" || { echo "MISSING $SO"; exit 1; }
            echo "--- $ABI ---"
            ls -lh "$SO"
            file "$SO"
            # 确认动态依赖 libopencv_java4.so（不依赖 libengine.so）
            "$READELF" -d "$SO" | grep -E 'NEEDED|SONAME' || true
            # 确认 strip 后 extern "C" 导出符号仍在动态符号表（FFI dlsym 依赖）
            "$READELF" --dyn-syms "$SO" | grep -E 'screenshot|loadImage|findImageBySIFT|crop|saveMat' \
              || { echo "ERROR: 导出符号丢失，FFI 将无法调用"; exit 1; }
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsy-4abi
          path: 界面/libs/**/libsy.so

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd 界面/libs
          zip -r "$GITHUB_WORKSPACE/libsy-4abi.zip" .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: libsy-4abi.zip
          generate_release_notes: true
